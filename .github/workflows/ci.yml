name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: |
          pnpm --filter marketing tsc --noEmit
          pnpm --filter admin tsc --noEmit

      - name: Lint
        run: |
          pnpm --filter marketing lint
          pnpm --filter admin lint

      - name: Build marketing
        run: pnpm --filter marketing build

      - name: Build admin
        run: pnpm --filter admin build
